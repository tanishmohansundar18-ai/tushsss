<!DOCTYPE html>
<html>
<head>
  <title>Just this</title>
  <style>
    body{
      background: linear-gradient(#ffe6f0,#ffb6c1);
      color:#333;
      text-align:center;
      font-family:Arial;
      padding:60px;
      line-height:1.8;
    }
    button{
      padding:10px 20px;
      margin:10px;
      border:none;
      border-radius:20px;
      cursor:pointer;
    }
    #yes{
      background:#ff66a3;
      color:white;
    }
    #no{
      background:#ccc;
    }
  </style>
</head>
<body>

<h1>Hey…</h1>

<p>When you call me “kanna”… it honestly makes my day.</p>

<p>I know things haven’t always been perfect between us…</p>

<p>But somewhere, I started liking you more than I expected.</p>

<p>I don’t want to complicate things…</p>

<p>I just wanted to ask this simply—</p>

<h2>Do you want to see where this goes? 💗</h2>

<button id="yes" onclick="yes()">Yes</button>
<button id="no" onclick="no()">Maybe</button>

<script>
function yes(){
  document.body.innerHTML = "<h1>😊 You just made me really happy</h1><p>Let’s take it slow… together.</p>";
}
function no(){
  document.body.innerHTML = "<h1>It’s okay 😊</h1><p>I’m still glad I told you honestly.</p>";
}
</script>

</body>
</html>
